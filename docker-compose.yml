services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: n_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuroclipper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n_user -d neuroclipper"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  bot:
    build: .
    restart: always
    command: python app/bot/main.py
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  worker:
    build: .
    restart: always
    command: celery -A core.tasks worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./assets:/app/assets
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  api:
    build: .
    restart: always
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./assets:/app/assets
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_data: